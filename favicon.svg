<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">David Dangerfield Logo</title>
  <desc id="desc">Rounded square with single D monogram</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#155e63" />
      <stop offset="100%" stop-color="#0f3f43" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f2c14e" />
      <stop offset="100%" stop-color="#c65d2e" />
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bg)" />
  <circle cx="376" cy="376" r="88" fill="url(#accent)" opacity="0.9" />
  <g fill="#ffffff" font-family="Space Grotesk, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">
    <text x="256" y="386" font-size="400" letter-spacing="0">D</text>
  </g>
</svg>
