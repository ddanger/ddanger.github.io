name: Sitemap Auto

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/generate-sitemap.mjs'
      - 'scripts/lib/routes.mjs'
      - '.github/workflows/sitemap-auto.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    name: Generate Sitemap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate sitemap.xml
        env:
          SITE_URL: https://daviddangerfield.com
        run: node scripts/generate-sitemap.mjs

      - name: Commit sitemap changes
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "No sitemap changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore: auto-update sitemap"
          git push
