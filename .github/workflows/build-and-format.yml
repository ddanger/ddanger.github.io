name: Build and Format Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  generated-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated output is committed
        run: npm run verify:generated

      - name: Verify generated formatting
        run: npm run format:check
