name: Generated Output Sync

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/build.mjs'
      - 'src/site.json'
      - 'src/partials/**'
      - '.github/workflows/generated-output-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-generated-output:
    name: Sync Generated Output
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build generated output
        run: npm run build

      - name: Commit generated output changes
        env:
          MAIN_PUSH_TOKEN: ${{ secrets.MAIN_PUSH_TOKEN }}
        run: |
          if [[ -z "${MAIN_PUSH_TOKEN}" ]]; then
            echo "MAIN_PUSH_TOKEN is not set. Add it in repository secrets."
            exit 1
          fi

          changed_files="$(git diff --name-only)"
          if [[ -z "${changed_files}" ]]; then
            echo "No generated output changes detected."
            exit 0
          fi

          unexpected_changes="$(printf '%s\n' "${changed_files}" | grep -Ev '^(index\.html|about/index\.html|services/index\.html|contact/index\.html)$' || true)"
          if [[ -n "${unexpected_changes}" ]]; then
            echo "Refusing to push unexpected file changes:"
            printf '%s\n' "${unexpected_changes}"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${MAIN_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add index.html about/index.html services/index.html contact/index.html
          git commit -m "chore: sync generated output"
          git push
