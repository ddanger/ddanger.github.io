name: PR Quality Gates

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/validate-source.mjs'
      - 'scripts/lib/routes.mjs'
      - '.github/workflows/pr-quality-gates.yml'

jobs:
  source-validation:
    name: Source Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Source Contracts
        run: node scripts/validate-source.mjs
